name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: go version check
        run: |
          go version
          if go version | grep -q "go1.26"; then
            echo "Go version is correct"
          else
            echo "Go version is incorrect"
            exit 1
          fi