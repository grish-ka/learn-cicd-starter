name: cd

on:
  push:
    branches: [main]
  
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: install dependencies
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          # tests
          goose -version # should be at least v3.18.0

      - name: build product
        run: |
          ./scripts/buildprod.sh

      - name: build image
        run: |
          docker build -t grishkkka/notely:latest .

      - name: migrate
        run: |
          ./scripts/migrateup.sh

      - name: gcloud push to ar
        run: |
          gcloud builds submit --tag europe-west2-docker.pkg.dev/notely-502919/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely --image europe-west2-docker.pkg.dev/notely-502919/notely-ar-repo/notely:latest --region europe-west2 --allow-unauthenticated --project notely-502919 --max-instances=4 --min-instances=0

      